<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Terminal header</title>
  <style>
    .term-text { font-family: 'Courier New', monospace; font-size: 13px; fill: #888; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes typeL1 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    @keyframes typeL2 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    @keyframes typeL3 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    @keyframes typeL4 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    @keyframes typeL5 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    .line1 { animation: typeL1 1s steps(30,end) 0.3s both; }
    .line2 { animation: typeL2 0.8s steps(25,end) 1.5s both; }
    .line3 { animation: typeL3 1.2s steps(40,end) 2.5s both; }
    .line4 { animation: typeL4 0.9s steps(28,end) 4s both; }
    .line5 { animation: typeL5 0.7s steps(20,end) 5.2s both; }
    .cur1 { opacity:0; animation: blink 0.8s step-end 1.3s 1; }
    .cur2 { opacity:0; animation: blink 0.8s step-end 2.3s 1; }
    .cur5 { animation: blink 1.2s step-end 5.9s infinite; }
  </style>
  <rect width="680" height="200" rx="10" fill="#0d0d0d"/>
  <rect x="0" y="0" width="680" height="32" rx="10" fill="#141414"/>
  <rect x="0" y="20" width="680" height="12" fill="#141414"/>
  <circle cx="20" cy="16" r="5" fill="#2a2a2a"/>
  <circle cx="36" cy="16" r="5" fill="#2a2a2a"/>
  <circle cx="52" cy="16" r="5" fill="#2a2a2a"/>
  <text x="340" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a3a3a">nadhez — zsh</text>
  <text x="40" y="62" class="term-text line1">
    <tspan fill="transparent">prompt </tspan><tspan fill="#e8e8e8">whoami</tspan>
  </text>
  <rect x="148" y="50" width="8" height="14" fill="#c9a96e" class="cur1"/>
  <text x="40" y="82" class="term-text line2">
    <tspan fill="#c9a96e">miftahul.khoiriyah</tspan><tspan fill="#555"> · IT Intern · Teaching Assistant · HMIF</tspan>
  </text>
  <text x="40" y="106" class="term-text line3">
    <tspan fill="transparent">prompt </tspan><tspan fill="#e8e8e8">cat focus.txt</tspan>
  </text>
  <rect x="165" y="94" width="8" height="14" fill="#c9a96e" class="cur2"/>
  <text x="40" y="126" class="term-text line4">
    <tspan fill="#4ade80">▸ </tspan><tspan fill="#888">network security · embedded systems · applied cryptography</tspan>
  </text>
  <text x="40" y="154" class="term-text line5">
    <tspan fill="#4ade80">➜ </tspan><tspan fill="#555">~/security</tspan>
  </text>
  <rect x="136" y="142" width="8" height="14" fill="#c9a96e" class="cur5"/>
  <rect x="40" y="168" width="600" height="0.5" fill="#1e1e1e"/>
  <text x="40" y="184" font-family="monospace" font-size="10" fill="#333">ITERA · Bandar Lampung · Indonesia</text>
</svg>
